# Render one-click deploy blueprint for the portfolio.
# In the Render dashboard: New → Blueprint → connect this repo → Deploy.
# The SQLite DB (data/portfolio.db) lives on the persistent disk below,
# so your content survives redeploys. Admin creds are set as secret env vars.

services:
  - type: web
    name: portfolio
    env: node
    plan: free
    region: oregon
    branch: main

    buildCommand: npm install && npm run build
    startCommand: npm run start

    healthCheckPath: /

    envVars:
      - key: NODE_ENV
        value: production

      - key: NEXT_PUBLIC_SITE_URL
          sync: false

      - key: ADMIN_USERNAME
        sync: false

      - key: ADMIN_PASSWORD
        sync: false

      - key: SESSION_SECRET
        sync: false

      - key: DB_PATH
        value: /data/portfolio.db

    disk:
      name: data
      mountPath: /data
      sizeGB: 1
