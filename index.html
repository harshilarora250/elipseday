<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>_elipseday — Projects</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f3ef;
      --surface: #ffffff;
      --ink: #1a1a18;
      --muted: #888880;
      --accent: #2d5a3d;
      --accent-light: #e8f0eb;
      --border: #e2ddd6;
      --shadow: rgba(30, 30, 20, 0.08);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Subtle noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 1;
      padding: 80px 60px 60px;
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      opacity: 0;
      animation: fadeUp 0.7s ease forwards;
    }

    .header-left { flex: 1; min-width: 220px; }

    .handle {
      font-family: 'DM Mono', monospace;
      font-size: clamp(2rem, 5vw, 3.6rem);
      font-weight: 500;
      letter-spacing: -0.03em;
      color: var(--ink);
      line-height: 1;
    }

    .handle span {
      color: var(--accent);
    }

    .tagline {
      margin-top: 10px;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .header-right {
      font-size: 0.7rem;
      color: var(--muted);
      text-align: right;
      line-height: 1.8;
      letter-spacing: 0.05em;
    }

    .live-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      margin-right: 5px;
      animation: pulse 2s ease infinite;
      vertical-align: middle;
    }

    /* ── GRID ── */
    main {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 60px 60px 100px;
    }

    .section-label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 36px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 32px 28px 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      opacity: 0;
      animation: fadeUp 0.55s ease forwards;
      cursor: default;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px var(--shadow);
      border-color: var(--accent);
    }

    /* Staggered animation */
    .card:nth-child(1) { animation-delay: 0.15s; }
    .card:nth-child(2) { animation-delay: 0.22s; }
    .card:nth-child(3) { animation-delay: 0.29s; }
    .card:nth-child(4) { animation-delay: 0.36s; }
    .card:nth-child(5) { animation-delay: 0.43s; }
    .card:nth-child(6) { animation-delay: 0.50s; }
    .card:nth-child(7) { animation-delay: 0.57s; }
    .card:nth-child(8) { animation-delay: 0.64s; }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .card-num {
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-top: 2px;
    }

    .card-tag {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: var(--accent-light);
      color: var(--accent);
      padding: 3px 8px;
      border-radius: 2px;
    }

    .card-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.45rem;
      line-height: 1.15;
      color: var(--ink);
      letter-spacing: -0.01em;
    }

    .card-desc {
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.75;
      flex: 1;
    }

    .card-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--ink);
      color: #fff;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 10px 18px;
      border-radius: 2px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background 0.2s ease, gap 0.2s ease;
      align-self: flex-start;
    }

    .card-btn:hover {
      background: var(--accent);
      gap: 12px;
    }

    .card-btn svg {
      transition: transform 0.2s ease;
    }

    .card-btn:hover svg {
      transform: translate(2px, -2px);
    }

    /* ── FOOTER ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px;
      border-top: 1px solid var(--border);
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @media (max-width: 600px) {
      header, main { padding-left: 24px; padding-right: 24px; }
      header { padding-top: 48px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <div class="handle"><span>_</span>elipseday</div>
      <div class="tagline">Project Collection</div>
    </div>
    <div class="header-right">
      <div><span class="live-dot"></span>8 projects</div>
      <div>Updated 2026</div>
    </div>
  </header>

  <main>
    <div class="section-label">Projects</div>
    <div class="grid" id="grid"></div>
  </main>

  <footer>_elipseday</footer>

  <script>
    const projects = [
      { num: "01", tag: "Tool", title: "Pause", desc: "Pause blocks the sites draining your time and locks your browser into full focus mode when you actually need to get things done.", link: "https://pause-lime.vercel.app/#" },
      { num: "02", tag: "App", title: "Orbital", desc: "Your universe, at a glance. Track the ISS live, watch rocket launches count down to zero, and explore 9,000+ satellites orbiting Earth right now", link: "https://orbital-indol.vercel.app/" },
      { num: "03", tag: "Tool", title: "CleanMode", desc: "Your laptop in cleaning mode perfect for not hitting random buttons.", link: "https://cleanmode.vercel.app/" },
      { num: "04", tag: "Tool", title: "ChessCalc", desc: "A chess game analysis software for FREE", link: "https://chesscalc.vercel.app/" },
      { num: "05", tag: "Web-App", title: "Justify Fit", desc: "Justify It In development", link: "https://justifyit.vercel.app/" },
      { num: "06", tag: "App", title: "Barcode-It", desc: "Easy to use barcode and QR Code generater", link: "https://barcodeit.vercel.app/" },
      { num: "07", tag: "Game", title: "Just a fun game", desc: "Based on https://fakestake.fun mine is a bit different however that one is better.", link: "https://greatstake.vercel.app/" },
      { num: "08", tag: "Support Me!", title: "Buy me a coffee", desc: "Coming soon", link: "https://elipseday.vercel.app/" },
    ];

    const arrow = `<svg width="10" height="10" viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 9L9 1M9 1H3M9 1V7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

    const grid = document.getElementById('grid');
    projects.forEach(p => {
      grid.innerHTML += `
        <div class="card">
          <div class="card-top">
            <span class="card-num">${p.num}</span>
            <span class="card-tag">${p.tag}</span>
          </div>
          <div class="card-title">${p.title}</div>
          <div class="card-desc">${p.desc}</div>
          <a class="card-btn" href="${p.link}" target="_blank" rel="noopener">
            View Project ${arrow}
          </a>
        </div>`;
    });
  </script>
</body>
</html>
